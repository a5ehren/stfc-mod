[graphics]

# Subgroup: Display
# -----------------

# Amount of time to spend between transitions, increase to slow transitions down
transition_time = 0.01

# This specifies the amount to scale the UI by, 1.0 being default
ui_scale = 0.6

# This specifies the amount to adjust the scale by, 0.05 being default
ui_scale_adjust = 0.05

# This specifies the amount to scale the UI Object Viewers by, 1.0 being default
ui_scale_viewer = 1.2

# Subgroup: Keyboard
# ------------------

# This controls the zoom speed when using Q/E in System View, defaults to 350
keyboard_zoom_speed = 350.0

# Controls the system pan momentum speed. Defaults to 0.4
system_pan_momentum = 0.4

# Controls how quickly the momentum falls off when letting go of the mouse. Lower = quicker stop. Defaults to 0.8
system_pan_momentum_falloff = 0.8

# Subgroup: Loader
# ----------------

# Set to true to use the loader_image for the loading screen
loader_enabled = true

# Path to the custom loading screen image (leave blank for embedded image)
loader_image = ""

# Set to true to use the loader image for the transition screen
loader_transition = true

# Subgroup: Options
# -----------------

# Allow the system cursor to be replaced? (On by default)
allow_cursor = true

# Allow borderless full screen mode, set to false to disable
borderless_fullscreen = true

# Allow free resizing, set to false to disable
free_resize = true

# To enable additional resolution options set this to true
show_all_resolutions = false

# After using a zoom preset it will be set as default zoom
use_presets_as_default = true

# Subgroup: Zoom
# --------------

# Set to 0.0 to disable custom zoom; enter system at specified zoom otherwise
default_system_zoom = 1750.0

# Zoom preset F1 for system view
system_zoom_preset_1 = 50.0

# Zoom preset F2 for system view
system_zoom_preset_2 = 500.0

# Zoom preset F3 for system view
system_zoom_preset_3 = 1250.0

# Zoom preset F4 for system view
system_zoom_preset_4 = 2750.0

# Zoom preset F5 for system view
system_zoom_preset_5 = 5000.0

# This controls the maximum zoom distance in System View. Default is 2500. Higher values increase label distance
zoom = 5000.0

