name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dev dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Validate remote sync schema
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest tests/test_remote_sync_schema.py -v

  build-win:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true
          package-cache-key: ${{ hashFiles('**/xmake.lua', '!macos-*/xmake.lua') }}

      - name: Configure
        run: xmake f -m release -y

      - name: Build
        run: xmake -y

      - name: Package
        run: mv build/windows/x64/release/stfc-community-mod.dll version.dll

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: stfc-community-mod
          path: version.dll
          if-no-files-found: error

  build-mac:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true
          package-cache-key: ${{ hashFiles('**/xmake.lua', '!win-*/xmake.lua') }}

      - name: Configure (arm64)
        run: xmake f -p macosx -a "arm64" -m release -y --target_minver=13.5

      - name: Build (arm64)
        run: xmake -y

      - name: Configure (x86)
        run: xmake f -p macosx -a "x86_64" -m release -y --target_minver=13.5

      - name: Build (x86)
        run: xmake -y

      - name: Rebuild launcher assets
        run: |
          xmake f -p macosx -a "arm64" -m release -y --target_minver=13.5
          xmake -r -y macOSLauncher
          test -f build/macosx/arm64/release/macOSLauncher.app/Contents/Resources/Assets.car

      - name: Create App Bundle
        run: |
          lipo -create build/macosx/arm64/release/macOSLauncher build/macosx/x86_64/release/macOSLauncher -output build/macosx/arm64/release/macOSLauncher.app/Contents/MacOS/macOSLauncher
          lipo -create build/macosx/arm64/release/stfc-community-mod-loader build/macosx/x86_64/release/stfc-community-mod-loader -output build/macosx/arm64/release/macOSLauncher.app/Contents/stfc-community-mod-loader
          lipo -create build/macosx/arm64/release/libstfc-community-mod.dylib build/macosx/x86_64/release/libstfc-community-mod.dylib -output build/macosx/arm64/release/macOSLauncher.app/Contents/libstfc-community-mod.dylib
          cp assets/launcher.icns build/macosx/arm64/release/macOSLauncher.app/Contents/Resources/
          cp macos-launcher/src/Info.plist build/macosx/arm64/release/macOSLauncher.app/Contents/
          mv build/macosx/arm64/release/macOSLauncher.app build/macosx/arm64/release/STFC\ Community\ Mod.app
          test -f build/macosx/arm64/release/STFC\ Community\ Mod.app/Contents/Resources/Assets.car

      - name: Sign App Bundle
        run: codesign --force --verify --verbose --deep --sign "-" build/macosx/arm64/release/STFC\ Community\ Mod.app

      - name: Package macOS mod archive
        run: |
          brew install zstd
          mkdir -p stfc-community-mod-macos-universal
          tar -cf - \
            -C build/macosx/arm64/release/STFC\ Community\ Mod.app/Contents \
            libstfc-community-mod.dylib \
            | zstd -19 -T0 -o stfc-community-mod-macos-universal/stfc-community-mod-macos-universal.tar.zst
          shasum -a 256 stfc-community-mod-macos-universal/stfc-community-mod-macos-universal.tar.zst \
            | awk '{print $1}' \
            > stfc-community-mod-macos-universal/stfc-community-mod-macos-universal.tar.zst.sha256

      - name: Install disk image creation tool
        run: brew install create-dmg

      - name: Create installer
        run: create-dmg --filesystem APFS --format ULFO --volname "STFC Community Mod Installer" --volicon assets/launcher.icns --background assets/mac_installer_background.png --window-pos 200 120 --window-size 800 400 --icon-size 100 --icon "STFC Community Mod.app" 200 190 --app-drop-link 600 185 stfc-community-mod-installer.dmg build/macosx/arm64/release/

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: stfc-community-mod-installer
          path: stfc-community-mod-installer.dmg
          compression-level: 0
          if-no-files-found: error

      - name: Upload macOS mod archive
        uses: actions/upload-artifact@v7
        with:
          name: stfc-community-mod-macos-universal
          path: stfc-community-mod-macos-universal
          compression-level: 0
          if-no-files-found: error
